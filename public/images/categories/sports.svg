<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ecfeff"/>
      <stop offset="100%" stop-color="#cffafe"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" rx="16" fill="url(#bg)"/>
  <!-- Dumbbell icon -->
  <g transform="translate(230, 100)">
    <rect x="0" y="20" width="25" height="50" rx="5" fill="none" stroke="#0891b2" stroke-width="5"/>
    <rect x="115" y="20" width="25" height="50" rx="5" fill="none" stroke="#0891b2" stroke-width="5"/>
    <line x1="25" y1="45" x2="115" y2="45" stroke="#0891b2" stroke-width="8" stroke-linecap="round"/>
    <rect x="0" y="20" width="25" height="50" rx="5" fill="#0891b2" fill-opacity="0.12"/>
    <rect x="115" y="20" width="25" height="50" rx="5" fill="#0891b2" fill-opacity="0.12"/>
  </g>
  <text x="300" y="280" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="28" font-weight="700" fill="#0e7490" text-anchor="middle">Sports &amp; Outdoors</text>
  <text x="300" y="310" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="400" fill="#0891b2" fill-opacity="0.7" text-anchor="middle">Fitness, Camping &amp; Adventure</text>
  <circle cx="280" cy="340" r="3" fill="#0891b2" fill-opacity="0.3"/>
  <circle cx="300" cy="340" r="3" fill="#0891b2" fill-opacity="0.3"/>
  <circle cx="320" cy="340" r="3" fill="#0891b2" fill-opacity="0.3"/>
</svg>
