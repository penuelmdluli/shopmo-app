<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ecfeff"/>
      <stop offset="100%" stop-color="#cffafe"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" rx="16" fill="url(#bg)"/>
  <!-- Flower icon -->
  <g transform="translate(260, 55)">
    <!-- Petals -->
    <ellipse cx="40" cy="15" rx="18" ry="25" fill="#0891b2" fill-opacity="0.15" stroke="#0891b2" stroke-width="4"/>
    <ellipse cx="40" cy="15" rx="18" ry="25" fill="#0891b2" fill-opacity="0.15" stroke="#0891b2" stroke-width="4" transform="rotate(72 40 40)"/>
    <ellipse cx="40" cy="15" rx="18" ry="25" fill="#0891b2" fill-opacity="0.15" stroke="#0891b2" stroke-width="4" transform="rotate(144 40 40)"/>
    <ellipse cx="40" cy="15" rx="18" ry="25" fill="#0891b2" fill-opacity="0.15" stroke="#0891b2" stroke-width="4" transform="rotate(216 40 40)"/>
    <ellipse cx="40" cy="15" rx="18" ry="25" fill="#0891b2" fill-opacity="0.15" stroke="#0891b2" stroke-width="4" transform="rotate(288 40 40)"/>
    <!-- Center -->
    <circle cx="40" cy="40" r="12" fill="#0891b2" fill-opacity="0.3" stroke="#0891b2" stroke-width="3"/>
    <!-- Stem -->
    <line x1="40" y1="65" x2="40" y2="130" stroke="#0891b2" stroke-width="5" stroke-linecap="round"/>
    <!-- Leaves -->
    <path d="M40 90 Q55 75 65 85 Q55 95 40 90" fill="#0891b2" fill-opacity="0.2" stroke="#0891b2" stroke-width="3"/>
    <path d="M40 105 Q25 90 15 100 Q25 110 40 105" fill="#0891b2" fill-opacity="0.2" stroke="#0891b2" stroke-width="3"/>
  </g>
  <text x="300" y="280" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="28" font-weight="700" fill="#0e7490" text-anchor="middle">Garden &amp; DIY</text>
  <text x="300" y="310" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="400" fill="#0891b2" fill-opacity="0.7" text-anchor="middle">Plants, Tools &amp; Outdoor Living</text>
  <circle cx="280" cy="340" r="3" fill="#0891b2" fill-opacity="0.3"/>
  <circle cx="300" cy="340" r="3" fill="#0891b2" fill-opacity="0.3"/>
  <circle cx="320" cy="340" r="3" fill="#0891b2" fill-opacity="0.3"/>
</svg>
