<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ecfeff"/>
      <stop offset="100%" stop-color="#cffafe"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" rx="16" fill="url(#bg)"/>
  <!-- Smartphone icon -->
  <g transform="translate(255, 60)">
    <rect x="0" y="0" width="90" height="160" rx="14" fill="none" stroke="#0891b2" stroke-width="5"/>
    <rect x="10" y="20" width="70" height="105" rx="4" fill="#0891b2" fill-opacity="0.12"/>
    <circle cx="45" cy="145" r="7" fill="none" stroke="#0891b2" stroke-width="3"/>
    <rect x="30" y="8" width="30" height="4" rx="2" fill="#0891b2" fill-opacity="0.4"/>
  </g>
  <!-- Category name -->
  <text x="300" y="280" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="28" font-weight="700" fill="#0e7490" text-anchor="middle">Electronics</text>
  <!-- Subtitle -->
  <text x="300" y="310" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="400" fill="#0891b2" fill-opacity="0.7" text-anchor="middle">Phones, Laptops &amp; More</text>
  <!-- Decorative dots -->
  <circle cx="280" cy="340" r="3" fill="#0891b2" fill-opacity="0.3"/>
  <circle cx="300" cy="340" r="3" fill="#0891b2" fill-opacity="0.3"/>
  <circle cx="320" cy="340" r="3" fill="#0891b2" fill-opacity="0.3"/>
</svg>
