<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ecfeff"/>
      <stop offset="100%" stop-color="#cffafe"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" rx="16" fill="url(#bg)"/>
  <!-- Gamepad icon -->
  <g transform="translate(230, 75)">
    <rect x="0" y="20" width="140" height="80" rx="20" fill="#0891b2" fill-opacity="0.12" stroke="#0891b2" stroke-width="5"/>
    <!-- D-pad -->
    <rect x="25" y="48" width="30" height="10" rx="2" fill="#0891b2"/>
    <rect x="35" y="38" width="10" height="30" rx="2" fill="#0891b2"/>
    <!-- Buttons -->
    <circle cx="100" cy="48" r="7" fill="none" stroke="#0891b2" stroke-width="3"/>
    <circle cx="120" cy="58" r="7" fill="none" stroke="#0891b2" stroke-width="3"/>
    <!-- Joystick bumps -->
    <rect x="50" y="0" width="15" height="25" rx="7" fill="none" stroke="#0891b2" stroke-width="4"/>
    <rect x="75" y="0" width="15" height="25" rx="7" fill="none" stroke="#0891b2" stroke-width="4"/>
  </g>
  <text x="300" y="280" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="28" font-weight="700" fill="#0e7490" text-anchor="middle">Toys &amp; Games</text>
  <text x="300" y="310" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="400" fill="#0891b2" fill-opacity="0.7" text-anchor="middle">Fun for All Ages</text>
  <circle cx="280" cy="340" r="3" fill="#0891b2" fill-opacity="0.3"/>
  <circle cx="300" cy="340" r="3" fill="#0891b2" fill-opacity="0.3"/>
  <circle cx="320" cy="340" r="3" fill="#0891b2" fill-opacity="0.3"/>
</svg>
